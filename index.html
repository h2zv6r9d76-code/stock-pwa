<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="在庫管理">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <title>在庫管理</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="title-wrap">
        <p class="eyebrow">INVENTORY</p>
        <h1>在庫管理</h1>
        <p id="summary" class="summary">読み込み中…</p>
      </div>
      <button id="addBtn" class="circle-button primary" aria-label="在庫を追加">＋</button>
    </header>

    <main>
      <section class="controls">
        <label class="search-box">
          <span class="search-icon">⌕</span>
          <input id="search" type="search" placeholder="検索" autocomplete="off">
          <button id="clearSearch" type="button" class="clear-search" hidden>×</button>
        </label>

        <div class="control-row">
          <select id="categoryFilter" class="ios-select">
            <option value="">すべての分類</option>
          </select>

          <div class="segmented" role="group" aria-label="表示切替">
            <button id="listViewBtn" type="button" class="segment active" aria-pressed="true">リスト</button>
            <button id="cardViewBtn" type="button" class="segment" aria-pressed="false">カード</button>
          </div>
        </div>
      </section>

      <section id="items" class="inventory list-view"></section>
      <div id="empty" class="empty-state" hidden>
        <div class="empty-icon">□</div>
        <h2>在庫がありません</h2>
        <p>右上の＋から最初の在庫を追加してください。</p>
      </div>

      <details class="settings-group">
        <summary>
          <span>バックアップ・設定</span>
          <span class="chevron">›</span>
        </summary>
        <div class="settings-content">
          <button id="backupBtn" class="settings-row">
            <span>バックアップを書き出す</span><span>›</span>
          </button>
          <label class="settings-row file-row">
            <span>バックアップから復元</span><span>›</span>
            <input id="restoreInput" type="file" accept="application/json,.json">
          </label>
          <button id="storageBtn" class="settings-row">
            <span>保存を保護する</span><span>›</span>
          </button>
          <button id="trashBtn" class="settings-row">
            <span>ゴミ箱</span><span id="trashCount" class="settings-badge">0</span>
          </button>
          <p id="storageInfo" class="footnote"></p>
          <p class="footnote">画像を含むJSONとして書き出し、「ファイルに保存」からiCloud Driveを選べます。</p>
        </div>
      </details>
    </main>
  </div>

  <dialog id="editor">
    <form id="itemForm" method="dialog">
      <div class="sheet-handle"></div>

      <div class="sheet-header">
        <button type="button" id="closeBtn" class="text-button">キャンセル</button>
        <h2 id="formTitle">在庫を追加</h2>
        <button type="submit" class="text-button strong">保存</button>
      </div>

      <input id="itemId" type="hidden">

      <section class="form-group">
        <label class="form-row">
          <span>商品名</span>
          <input id="name" required maxlength="100" autocomplete="off" placeholder="必須">
        </label>
      </section>

      <section class="form-group">
        <div class="form-row quantity-editor">
          <span>数量</span>
          <div class="stepper large-stepper">
            <button type="button" id="formMinus" aria-label="数量を減らす">−</button>
            <input id="quantity" type="number" step="0.01" value="1" required inputmode="decimal">
            <button type="button" id="formPlus" aria-label="数量を増やす">＋</button>
          </div>
        </div>
        <label class="form-row">
          <span>単位</span>
          <input id="unit" placeholder="個・箱・巻など" maxlength="20">
        </label>
        <label class="form-row">
          <span>分類</span>
          <input id="category" placeholder="消耗品・工具など" maxlength="50">
        </label>
        <label class="form-row">
          <span>保管場所</span>
          <input id="location" placeholder="棚A・引き出しなど" maxlength="100">
        </label>
      </section>

      <section class="form-group">
        <label class="form-row stacked">
          <span>メモ</span>
          <textarea id="note" rows="4" maxlength="500" placeholder="メモを入力"></textarea>
        </label>
      </section>

      <section class="form-group">
        <label class="form-row file-picker">
          <span>写真・画像を選択</span><span class="row-chevron">›</span>
          <input id="photo" type="file" accept="image/*">
        </label>
        <img id="photoPreview" class="preview" hidden alt="選択画像">
        <label class="form-row checkbox-row">
          <span>現在の画像を削除</span>
          <input id="removePhoto" type="checkbox">
        </label>
      </section>

      <button type="button" id="deleteBtn" class="delete-row" hidden>この在庫を削除</button>
    </form>
  </dialog>


  <dialog id="trashDialog" class="trash-dialog">
    <div class="trash-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <button type="button" id="closeTrashBtn" class="text-button">閉じる</button>
        <h2>ゴミ箱</h2>
        <button type="button" id="emptyTrashBtn" class="text-button danger-text">すべて削除</button>
      </div>
      <div id="trashItems" class="trash-list"></div>
      <div id="trashEmpty" class="empty-state" hidden>
        <div class="empty-icon">□</div>
        <h2>ゴミ箱は空です</h2>
        <p>削除した在庫はここに移動します。</p>
      </div>
    </div>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
