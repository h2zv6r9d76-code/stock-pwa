<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="在庫管理">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <title>在庫管理</title>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div>
      <p class="eyebrow">INVENTORY</p>
      <h1>在庫管理</h1>
      <p id="summary" class="summary">読み込み中…</p>
    </div>
    <button id="addBtn" class="add-button" aria-label="追加">＋</button>
  </header>

  <main>
    <section class="filters">
      <label class="search">
        <span>⌕</span>
        <input id="search" type="search" placeholder="検索">
        <button id="clearSearch" type="button" hidden>×</button>
      </label>
      <div class="filter-row">
        <select id="categoryFilter">
          <option value="">すべての分類</option>
        </select>
        <div class="segments">
          <button id="listViewBtn" class="active" type="button">リスト</button>
          <button id="cardViewBtn" type="button">カード</button>
        </div>
      </div>
    </section>

    <p class="swipe-hint">項目を左へスワイプすると削除できます</p>
    <section id="items" class="inventory list-view"></section>

    <div id="empty" class="empty" hidden>
      <div class="empty-mark">□</div>
      <h2>在庫がありません</h2>
      <p>右上の＋から追加してください。</p>
    </div>

    <details class="settings">
      <summary><span>バックアップ・設定</span><span>›</span></summary>
      <div>
        <button id="trashBtn" class="settings-row">
          <span>ゴミ箱</span><span id="trashCount" class="badge">0</span>
        </button>
        <button id="backupBtn" class="settings-row"><span>バックアップを書き出す</span><span>›</span></button>
        <button id="syncBtn" class="settings-row"><span>クラウド同期</span><span id="syncStatus" class="sync-status">オフ</span></button>
        <label class="settings-row file-row">
          <span>バックアップから復元</span><span>›</span>
          <input id="restoreInput" type="file" accept="application/json,.json">
        </label>
        <p id="storageInfo" class="footnote"></p>
      </div>
    </details>
  </main>
</div>

<dialog id="editor">
  <form id="itemForm">
    <div class="handle"></div>
    <div class="sheet-head">
      <button type="button" id="closeBtn">キャンセル</button>
      <h2 id="formTitle">在庫を追加</h2>
      <button type="submit" class="save">保存</button>
    </div>
    <input id="itemId" type="hidden">

    <section class="form-group">
      <label class="form-row"><span>商品名</span><input id="name" required maxlength="100" placeholder="必須"></label>
    </section>

    <section class="form-group">
      <div class="form-row">
        <span>数量</span>
        <div class="form-stepper">
          <button id="formMinus" type="button">−</button>
          <input id="quantity" type="number" step="0.01" value="1" required>
          <button id="formPlus" type="button">＋</button>
        </div>
      </div>
      <label class="form-row"><span>単位</span><input id="unit" maxlength="20" placeholder="個・箱など"></label>
      <label class="form-row"><span>分類</span><input id="category" maxlength="50" placeholder="工具など"></label>
      <div id="categorySuggestions" class="suggestions" hidden></div>
      <label class="form-row"><span>保管場所</span><input id="location" maxlength="100" placeholder="棚Aなど"></label>
      <div id="locationSuggestions" class="suggestions" hidden></div>
    </section>

    <section class="form-group">
      <label class="form-row stacked"><span>メモ</span><textarea id="note" rows="4" maxlength="500"></textarea></label>
    </section>

    <section class="form-group">
      <label class="form-row stacked"><span>関連ワード</span><input id="keywords" maxlength="300" placeholder="例：ネジ、ビス、DIY（カンマ区切り）"></label>
      <div id="keywordSuggestions" class="suggestions" hidden></div>
      <p class="field-note">検索に引っかかりやすくするための言葉です。候補を押すだけで追加できます。</p>
    </section>

    <section class="form-group">
      <label class="form-row file-picker">
        <span>写真・画像を選択</span><span>›</span>
        <input id="photo" type="file" accept="image/*">
      </label>
      <img id="photoPreview" class="preview" hidden alt="">
      <label class="form-row"><span>現在の画像を削除</span><input id="removePhoto" type="checkbox"></label>
    </section>

    <button id="deleteBtn" type="button" class="delete-item" hidden>ゴミ箱へ移動</button>
  </form>
</dialog>

<dialog id="trashDialog">
  <div class="trash-sheet">
    <div class="handle"></div>
    <div class="sheet-head">
      <button id="closeTrashBtn" type="button">閉じる</button>
      <h2>ゴミ箱</h2>
      <button id="emptyTrashBtn" type="button" class="danger-text">すべて削除</button>
    </div>
    <div id="trashItems" class="trash-list"></div>
    <div id="trashEmpty" class="empty" hidden>
      <div class="empty-mark">□</div>
      <h2>ゴミ箱は空です</h2>
    </div>
  </div>
</dialog>

<div id="toast" class="toast" hidden>
  <span id="toastText"></span>
  <button id="undoBtn" type="button">元に戻す</button>
</div>

<dialog id="loginDialog">
  <form id="loginForm">
    <div class="handle"></div>
    <div class="sheet-head">
      <button id="closeLoginBtn" type="button">キャンセル</button>
      <h2>クラウド同期にログイン</h2>
      <button class="save" type="submit">ログイン</button>
    </div>
    <p class="login-note">同期用に設定したパスワードを入力してください。この端末にだけログイン情報を保存します。</p>
    <section class="form-group">
      <label class="form-row stacked"><span>パスワード</span><input id="syncPassword" type="password" autocomplete="current-password" required minlength="16" placeholder="16文字以上"></label>
    </section>
  </form>
</dialog>

<script src="./app.js"></script>
</body>
</html>
