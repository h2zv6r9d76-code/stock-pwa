<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="在庫管理">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="stylesheet" href="./style.css">
  <title>在庫管理</title>
</head>
<body>
<header>
  <div>
    <h1>在庫管理</h1>
    <p id="summary">読み込み中…</p>
  </div>
  <button id="addBtn" class="primary">＋ 追加</button>
</header>

<main>
  <div class="toolbar">
    <input id="search" type="search" placeholder="商品名・場所・メモを検索">
    <select id="categoryFilter">
      <option value="">すべての分類</option>
    </select>
  </div>

  <section id="items" class="grid"></section>
  <p id="empty" class="empty" hidden>在庫がありません。「＋ 追加」から登録してください。</p>

  <details class="settings">
    <summary>バックアップ・設定</summary>
    <div class="settings-body">
      <button id="backupBtn">バックアップを書き出す</button>
      <label class="file-button">
        バックアップから復元
        <input id="restoreInput" type="file" accept="application/json,.json">
      </label>
      <button id="storageBtn">保存を保護する</button>
      <p id="storageInfo" class="small"></p>
      <p class="small">バックアップは画像を含むJSONです。「ファイルに保存」からiCloud Driveを選択できます。</p>
    </div>
  </details>
</main>

<dialog id="editor">
  <form id="itemForm" method="dialog">
    <div class="dialog-head">
      <h2 id="formTitle">在庫を追加</h2>
      <button type="button" id="closeBtn" class="icon-btn">×</button>
    </div>

    <input id="itemId" type="hidden">

    <label>商品名
      <input id="name" required maxlength="100" autocomplete="off">
    </label>

    <div class="two">
      <label>数量
        <input id="quantity" type="number" step="0.01" value="1" required>
      </label>
      <label>単位
        <input id="unit" placeholder="個・箱・巻など" maxlength="20">
      </label>
    </div>

    <label>分類
      <input id="category" placeholder="消耗品・工具など" maxlength="50">
    </label>

    <label>保管場所
      <input id="location" placeholder="棚A・引き出しなど" maxlength="100">
    </label>

    <label>メモ
      <textarea id="note" rows="3" maxlength="500"></textarea>
    </label>

    <label>画像
      <input id="photo" type="file" accept="image/*" capture="environment">
    </label>
    <img id="photoPreview" class="preview" hidden alt="選択画像">
    <label class="check"><input id="removePhoto" type="checkbox"> 現在の画像を削除</label>

    <div class="actions">
      <button type="button" id="deleteBtn" class="danger" hidden>削除</button>
      <button type="submit" class="primary">保存</button>
    </div>
  </form>
</dialog>

<script src="./app.js"></script>
</body>
</html>
